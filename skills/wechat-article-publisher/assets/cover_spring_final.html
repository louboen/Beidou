<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>春季中医养生</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;height:100vh;background:#1a1a1a;font-family:'Microsoft YaHei',sans-serif}
.cover{width:900px;height:500px;background:linear-gradient(135deg,#5aa85a 0%,#7bc97b 50%,#9ce89c 100%);position:relative;overflow:hidden}
/* 右上角太极图 */
.taiji-bg{position:absolute;top:15px;right:15px;width:200px;height:200px;background:radial-gradient(circle at 50% 50%,rgba(255,255,255,0.3) 50%,rgba(0,0,0,0.3) 50%);border-radius:50%}
/* 左侧中草药叶 */
.leaf{position:absolute;background:rgba(255,255,255,0.25);border-radius:50% 0 50% 0}
.leaf1{top:80px;left:40px;width:100px;height:60px;transform:rotate(30deg)}
.leaf2{bottom:100px;left:60px;width:80px;height:50px;transform:rotate(-40deg)}
.leaf3{top:200px;left:100px;width:60px;height:40px;transform:rotate(55deg)}
.content{position:relative;z-index:10;text-align:center;padding-top:100px;color:white;text-shadow:2px 2px 8px rgba(0,0,0,0.5)}
.title{font-size:52px;font-weight:bold;letter-spacing:5px;margin-bottom:20px}
.subtitle{font-size:30px;font-weight:300;letter-spacing:3px;margin-bottom:40px;opacity:0.95}
.divider{width:180px;height:4px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.9),transparent);margin:0 auto 25px;border-radius:2px}
.footer{font-size:18px;opacity:0.9;letter-spacing:2px}
.season{position:absolute;top:15px;left:15px;font-size:16px;opacity:0.4;border:2px solid rgba(255,255,255,0.4);padding:8px 15px;border-radius:8px;background:rgba(255,255,255,0.1)}
</style>
</head>
<body>
<div class="cover">
<!-- 太极图背景 -->
<div class="taiji-bg"></div>
<!-- 中草药叶装饰 -->
<div class="leaf leaf1"></div>
<div class="leaf leaf2"></div>
<div class="leaf leaf3"></div>
<!-- 季节标签 -->
<div class="season">春季养生</div>
<!-- 主要内容 -->
<div class="content">
<div class="title">春季中医养生</div>
<div class="subtitle">养肝护肝 疏肝理气</div>
<div class="divider"></div>
<div class="footer">中医健康科普 · 娄伯恩医师</div>
</div>
</div>
</body></html>
