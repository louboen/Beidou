<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>谷雨养生封面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            background: #1a1a1a;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }
        .cover {
            width: 900px;
            height: 500px;
            background: linear-gradient(135deg, #1a4a2e 0%, #2d6b45 30%, #4a8f5a 70%, #6ab87a 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        /* 装饰圆形 */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
        }
        .circle-1 { width: 300px; height: 300px; top: -100px; right: -100px; }
        .circle-2 { width: 200px; height: 200px; bottom: -50px; left: -50px; }
        .circle-3 { width: 150px; height: 150px; top: 50%; left: 20%; }
        
        /* 叶子装饰 */
        .leaf {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(120, 200, 150, 0.3);
            border-radius: 0 50% 0 50%;
            transform: rotate(45deg);
        }
        .leaf-1 { top: 80px; left: 100px; }
        .leaf-2 { top: 150px; left: 180px; transform: rotate(75deg) scale(0.8); }
        .leaf-3 { bottom: 100px; right: 150px; transform: rotate(-30deg) scale(1.2); }
        .leaf-4 { bottom: 180px; right: 220px; transform: rotate(-60deg) scale(0.9); }
        
        /* 文字容器 */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding-top: 100px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }
        .title {
            font-size: 56px;
            font-weight: bold;
            letter-spacing: 8px;
            margin-bottom: 20px;
            background: linear-gradient(180deg, #ffffff 0%, #e8f5e9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 40px;
            opacity: 0.95;
        }
        .divider {
            width: 200px;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            margin: 0 auto 30px;
        }
        .footer {
            font-size: 18px;
            opacity: 0.85;
            letter-spacing: 2px;
        }
        .grain-icon {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="cover">
        <!-- 装饰元素 -->
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
        
        <div class="leaf leaf-1"></div>
        <div class="leaf leaf-2"></div>
        <div class="leaf leaf-3"></div>
        <div class="leaf leaf-4"></div>
        
        <!-- 内容 -->
        <div class="content">
            <div class="grain-icon">🌾</div>
            <h1 class="title">谷雨养生</h1>
            <h2 class="subtitle">雨生百谷 祛湿健脾</h2>
            <div class="divider"></div>
            <p class="footer">中医健康科普 · 娄伯恩医师</p>
        </div>
    </div>
</body>
</html>
